name: Build Base Image

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      force_rebuild: ${{ steps.check.outputs.force_rebuild }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Get image hash
        id: version
        run: |
          OUT_PATH=$(nix eval .#base-image.outPath --raw --impure)
          HASH="${OUT_PATH##*/nix/store/}"
          HASH="${HASH%%-*}"
          TAG="$(date +%Y.%m.%d)-${HASH:0:8}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if already built
        id: check
        run: |
          FORCE=${{ github.event.inputs.force_rebuild == 'true' }}
          echo "force_rebuild=$FORCE" >> $GITHUB_OUTPUT
          if [ "$FORCE" = "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          TAG="${{ steps.version.outputs.tag }}"
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} > /dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  cleanup:
    needs: check-version
    if: needs.check-version.outputs.force_rebuild == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Delete existing release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          if gh release view "${TAG}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Deleting release ${TAG}"
            gh release delete "${TAG}" --repo ${{ github.repository }} --yes --cleanup-tag
          fi
      - name: Delete existing package versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          ORG="${{ github.repository_owner }}"
          IMAGE="${{ github.repository }}"
          IMAGE="${IMAGE#*/}"
          VERSIONS=$(gh api "/orgs/${ORG}/packages/container/${IMAGE}/versions" --jq ".[] | select(.metadata.container.tags | index(\"${TAG}\")) | .id" 2>/dev/null || true)
          for VID in $VERSIONS; do
            echo "Deleting package version ${VID} for tag ${TAG}"
            gh api --method DELETE "/orgs/${ORG}/packages/container/${IMAGE}/versions/${VID}" 2>/dev/null || echo "::warning::Could not delete package version ${VID} — GITHUB_TOKEN may lack delete:packages scope"
          done
          for ARCH_TAG in "${TAG}-amd64" "${TAG}-arm64" "${TAG}-debug-amd64" "${TAG}-debug-arm64"; do
            AVIDS=$(gh api "/orgs/${ORG}/packages/container/${IMAGE}/versions" --jq ".[] | select(.metadata.container.tags | index(\"${ARCH_TAG}\")) | .id" 2>/dev/null || true)
            for AVID in $AVIDS; do
              echo "Deleting arch package version ${AVID} for tag ${ARCH_TAG}"
              gh api --method DELETE "/orgs/${ORG}/packages/container/${IMAGE}/versions/${AVID}" 2>/dev/null || echo "::warning::Could not delete arch package version ${AVID}"
            done
          done

  build:
    needs: [check-version, cleanup]
    if: needs.check-version.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push to GHCR
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          ARCH="${{ matrix.arch }}"
          nix run .#base-image.copyTo --impure -- "docker://${IMAGE}:${TAG}-${ARCH}"
          nix run .#base-image.copyTo --impure -- "docker://${IMAGE}:latest-${ARCH}"
          nix run .#base-debug-image.copyTo --impure -- "docker://${IMAGE}:${TAG}-debug-${ARCH}"
          nix run .#base-debug-image.copyTo --impure -- "docker://${IMAGE}:latest-debug-${ARCH}"

  create-manifest:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Create multi-arch manifests
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          for SUFFIX in "" "-debug"; do
            for T in "${TAG}${SUFFIX}" "latest${SUFFIX}"; do
              docker manifest create "${IMAGE}:${T}" \
                --amend "${IMAGE}:${T}-amd64" \
                --amend "${IMAGE}:${T}-arm64"
              docker manifest push "${IMAGE}:${T}"
            done
          done

  release:
    needs: [check-version, create-manifest]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          if gh release view "${TAG}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping"
            exit 0
          fi
          gh release create "${TAG}" \
            --repo ${{ github.repository }} \
            --title "${TAG}" \
            --notes "Base image build ${TAG}"
