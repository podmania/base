name: Build Base Image

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      force_rebuild: ${{ steps.check.outputs.force_rebuild }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Get image hash
        id: version
        run: |
          OUT_PATH=$(nix eval .#base-image.outPath --raw --impure)
          HASH="${OUT_PATH##*/nix/store/}"
          HASH="${HASH%%-*}"
          TAG="$(date +%Y.%m.%d)-${HASH:0:8}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if already built
        id: check
        run: |
          FORCE=${{ github.event.inputs.force_rebuild == 'true' }}
          echo "force_rebuild=$FORCE" >> $GITHUB_OUTPUT
          if [ "$FORCE" = "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          TAG="${{ steps.version.outputs.tag }}"
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} > /dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  cleanup:
    needs: check-version
    if: needs.check-version.outputs.force_rebuild == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Delete existing release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          if gh release view "${TAG}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Deleting release ${TAG}"
            gh release delete "${TAG}" --repo ${{ github.repository }} --yes --cleanup-tag
          fi
      - name: Delete existing package version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          PACKAGE_NAME="${{ github.repository }}"
          PACKAGE_NAME="${PACKAGE_NAME,,}"
          PACKAGE_ID=$(gh api "/orgs/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME#*/}" --jq '.id' 2>/dev/null || echo "")
          if [ -n "$PACKAGE_ID" ]; then
            VERSION_ID=$(gh api "/orgs/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME#*/}/versions" --jq ".[] | select(.metadata.container.tags | index(\"${TAG}\")) | .id" 2>/dev/null || echo "")
            if [ -n "$VERSION_ID" ]; then
              echo "Deleting package version ${VERSION_ID} for tag ${TAG}"
              gh api --method DELETE "/orgs/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME#*/}/versions/${VERSION_ID}" 2>/dev/null || echo "Could not delete package version (may need manual cleanup)"
            fi
          fi

  build:
    needs: [check-version, cleanup]
    if: needs.check-version.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push to GHCR
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          nix run .#base-image.copyTo --impure -- docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-${{ matrix.arch }}
          nix run .#base-image.copyTo --impure -- docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}

  create-manifest:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Create multi-arch manifest
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}

          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  release:
    needs: [check-version, create-manifest]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          if gh release view "${TAG}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping"
            exit 0
          fi
          gh release create "${TAG}" \
            --repo ${{ github.repository }} \
            --title "${TAG}" \
            --notes "Base image build ${TAG}"
