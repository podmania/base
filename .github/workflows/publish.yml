name: Build Base Image

permissions:
  contents: read
  packages: write

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-digest:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Install skopeo and jq
        run: sudo apt-get update && sudo apt-get install -y skopeo jq

      - name: Get upstream digest
        id: digest
        run: |
          DIGEST=$(skopeo inspect docker://gcr.io/distroless/static-debian13:latest | jq -r '.Digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Check if digest changed
        id: check
        run: |
          FORCE=${{ github.event.inputs.force_rebuild == 'true' }}
          if [ "$FORCE" = "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CURRENT=$(grep 'imageDigest' flake.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "${{ steps.digest.outputs.digest }}" = "$CURRENT" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-digest
    if: needs.check-digest.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build OCI image
        run: nix build .#base-image --impure
      - name: Load and tag
        run: |
          docker load < result
          DIGEST="${{ needs.check-digest.outputs.digest }}"
          docker tag base:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${DIGEST}-${{ matrix.arch }}
          docker tag base:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
      - name: Push
        run: |
          DIGEST="${{ needs.check-digest.outputs.digest }}"
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${DIGEST}-${{ matrix.arch }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}

  create-manifest:
    needs: [check-digest, build]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Create multi-arch manifest
        run: |
          DIGEST="${{ needs.check-digest.outputs.digest }}"
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${DIGEST} \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${DIGEST}-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${DIGEST}-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${DIGEST}

          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
